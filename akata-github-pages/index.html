<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akata Network - Flow & ROI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="hero">
  <h1>AKATA NETWORK FLOW</h1>
  <p>Flow operasional & proyeksi ROI tahunan</p>
</header>

<section class="flowchart">
  <h2>Flowchart Process</h2>
  <div class="flow">
    <div class="node">Traffic</div>
    <div class="arrow">→</div>
    <div class="node">Landing Page</div>
    <div class="arrow">→</div>
    <div class="node">Lead Capture</div>
    <div class="arrow">→</div>
    <div class="node">Closing</div>
    <div class="arrow">→</div>
    <div class="node">Retention</div>
  </div>
</section>

<section class="roi">
  <h2>ROI Calculator (Annual Projection)</h2>

  <div class="form">
    <label>Monthly Ad Spend (Rp)</label>
    <input type="number" id="adspend" value="3000000"/>

    <label>Cost per Lead (Rp)</label>
    <input type="number" id="cpl" value="30000"/>

    <label>Conversion Rate (%)</label>
    <input type="number" id="cr" value="10"/>

    <label>Average Order Value (Rp)</label>
    <input type="number" id="aov" value="500000"/>

    <button onclick="calculateROI()">Calculate</button>
  </div>

  <div class="result">
    <p>Leads / Month: <span id="leads"></span></p>
    <p>Sales / Month: <span id="sales"></span></p>
    <p>Revenue / Month: <span id="revenue"></span></p>
    <p>Revenue / Year: <span id="yearly"></span></p>
    <p>ROI (%): <span id="roi"></span></p>
  </div>
</section>

<footer>
  <p>© 2026 Akata Network</p>
</footer>

<script src="script.js"></script>
</body>
</html>
